<!DOCTYPE html>
<html lang="en">
<head>

<title>Book Lab Test | SMS LABS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Poppins', sans-serif;
margin:0;
background:#f4f8fb;
text-align:center;
}

header{
background:#0b3c5d;
color:white;
padding:25px;
}

.btn{
background:white;
color:#0b3c5d;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:25px;
cursor:pointer;
font-weight:600;
}

#booking{
padding:60px 20px;
}

.booking-card{
background:white;
max-width:420px;
margin:auto;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.booking-card input,
.booking-card select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<header>
<h1>Book Lab Test</h1>
</header>

<section id="booking">

<div class="booking-card">

<h2>Book Your Test</h2>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="test">
<option>Select Test</option>
<option>Blood Test</option>
<option>ECG Test</option>
<option>X-Ray</option>
<option>Semen Analysis</option>
<option>COVID RT PCR Test</option>
</select>

<input type="date" id="date" required>

<button type="submit" class="btn">Send Booking</button>

</form>

</div>

</section>

<script>

function sendWhatsApp(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var test=document.getElementById("test").value;
var date=document.getElementById("date").value;

var message="SMS LABS Appointment Booking:%0A%0AName: "+name+"%0APhone: "+phone+"%0ATest: "+test+"%0ADate: "+date;

var url="https://wa.me/918778705003?text="+message;

window.open(url,"_blank");

}

</script>

</body>
</html>
